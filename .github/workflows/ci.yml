name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lint tools
        run: brew install swiftlint swiftformat
      - name: Quality gate
        run: make check
      # La release builda in configurazione release (dentro make dmg): esercitala anche in CI, così
      # un guasto solo-release (ottimizzatore, codice sotto -Onone) non emerge alla pubblicazione.
      - name: Release build
        run: swift build -c release
